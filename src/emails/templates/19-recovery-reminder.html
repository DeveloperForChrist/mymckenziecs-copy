<!-- Trigger: post-lapse lifecycle reminders (day 14/30/60)
     Purpose: encourage reactivation before archival/deletion
     Key elements: resume CTA, archive/delete dates, opt-out link -->
<!doctype html>
<html>
  <head><meta charset="utf-8"/><title>Resume your plan</title></head>
  <body>
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
      <h1>Your workspace is paused</h1>
      <p>Hi {{name}},</p>
      <p>Your paid access is currently inactive.</p>
      <p>Archive date: {{archive_date}}<br/>Deletion date: {{delete_date}}</p>
      <p><a href="{{resume_url}}">Resume plan</a></p>
      <p style="font-size: 13px; color: #6b7280;">
        Stop these reminders: <a href="{{opt_out_url}}">opt out</a>
      </p>
      <p style="margin-top: 24px; color: #6b7280; font-size: 12px;">MyMcKenzieCS</p>
    </div>
  </body>
</html>
