<!-- Trigger: sent after a user account is successfully deleted -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Account Deleted</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:12px;padding:28px;border:1px solid #e5e7eb;">
            <tr>
              <td>
                <h1 style="margin:0 0 14px;font-size:24px;line-height:1.3;color:#111827;">Your account has been deleted</h1>
                <p style="margin:0 0 14px;font-size:15px;line-height:1.7;">Hi {{name}},</p>
                <p style="margin:0 0 14px;font-size:15px;line-height:1.7;">
                  This confirms your MyMcKenzieCS account deletion request has been completed.
                </p>
                <p style="margin:0 0 18px;font-size:15px;line-height:1.7;">
                  If you did not make this request, please contact us immediately at
                  <a href="mailto:{{support_email}}" style="color:#4f46e5;text-decoration:underline;">{{support_email}}</a>.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  <p style="margin-top: 24px;">MyMcKenzieCS</p>
  </body>
</html>
