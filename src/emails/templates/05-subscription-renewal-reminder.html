<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Subscription renewal reminder</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #111; line-height: 1.6;">
    <h2 style="margin: 0 0 12px;">Subscription renewal reminder</h2>
    <p>Hi {{name}},</p>
    <p>
      Your <strong>{{plan_name}}</strong> plan is due to renew on <strong>{{renewal_date}}</strong>.
    </p>
    <p>
      Time remaining: <strong>{{days_left}} days</strong>.
    </p>
    <p><a href="{{manage_url}}">Manage your plan</a></p>
    <p style="margin-top: 24px;">MyMcKenzieCS</p>
  </body>
</html>
