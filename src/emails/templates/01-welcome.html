<!-- Trigger: after first dashboard login
     Purpose: Confirm account, highlight limits, CTA to dashboard
     Key elements: greeting, summary of limits, CTA button, support footer -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Welcome to MyMcKenzieCS</title>
    <style>/* minimal styles */ a.button{display:inline-block;padding:10px 16px;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none}</style>
  </head>
  <body>
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
      <h1 style="margin:0 0 8px;">Welcome, {{name}}!</h1>
    <p>This email now confirms your registration with MyMcKenzieCS.</p>
    <p>Your email has been verified, and your account is ready to use.</p>
    <p><a class="button" href="{{cta_url}}">Go To Dashboard</a></p>
    <hr />
    <p>If you have any questions or need assistance, our support team is available at support@mymckenziecs.com.</p>
    </div>
  </body>
</html>
