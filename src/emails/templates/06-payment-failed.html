<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Payment failed</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #111; line-height: 1.6;">
    <h2 style="margin: 0 0 12px;">Payment failed</h2>
    <p>Hi {{name}},</p>
    <p>
      We were unable to process your subscription payment for invoice <strong>{{invoice_id}}</strong>.
    </p>
    <p><strong>Next retry date:</strong> {{next_retry_date}}</p>
    <p><strong>Grace period ends:</strong> {{grace_end_date}}</p>
    <p><strong>Grace period length:</strong> {{grace_days}} days</p>
    <p><a href="{{retry_url}}">Retry payment</a></p>
    <p><a href="{{invoice_url}}">View invoice</a></p>
    <p style="margin-top: 24px;">MyMcKenzieCS</p>
  </body>
</html>
