<!-- Trigger: user requests password reset
     Purpose: Provide secure reset link and support contact
     Key elements: reset link, expiry, support info -->
<!doctype html>
<html>
  <head><meta charset="utf-8"/><title>Password reset</title></head>
  <body>
    <h1>Password reset request</h1>
    <p>Hello {{name}},</p>
    <p>We received a request to reset your password.</p>
    <p>Click the link below to reset your password. This link expires in {{expiry_minutes}} minutes.</p>
    <p><a href="{{reset_url}}">Reset your password</a></p>
    <p>If you did not request this, contact support at support@mymckenziecs.com.</p>
  </body>
</html>
