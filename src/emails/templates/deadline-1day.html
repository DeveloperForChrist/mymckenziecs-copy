<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Urgent deadline reminder</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #111; line-height: 1.6;">
    <h2 style="margin: 0 0 12px;">Urgent: deadline is tomorrow</h2>
    <p>Hi {{name}},</p>
    <p>
      You have <strong>{{days_left}} day</strong> remaining before your deadline.
    </p>
    <p><strong>Deadline:</strong> {{deadline_title}}</p>
    <p><strong>Date:</strong> {{deadline_date}}</p>
    <p><a href="{{action_url}}">Open calendar now</a></p>
    <p style="margin-top: 24px;">MyMcKenzieCS</p>
  </body>
</html>
