<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Payment reminder</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #111; line-height: 1.6;">
    <h2 style="margin: 0 0 12px;">Payment reminder</h2>
    <p>Hi {{name}},</p>
    <p>
      We still have not been able to collect your subscription payment.
    </p>
    <p><strong>Next retry date:</strong> {{next_retry_date}}</p>
    <p><strong>Grace period ends:</strong> {{grace_end_date}}</p>
    <p><a href="{{manage_url}}">Update payment method</a></p>
    <p style="margin-top: 24px;">MyMcKenzieCS</p>
  </body>
</html>
