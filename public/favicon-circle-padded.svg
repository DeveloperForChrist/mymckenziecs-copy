<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-label="MyMcKenzieCS favicon"
>
  <title>MyMcKenzieCS favicon</title>
  <!-- Dedicated favicon variant: use the square brand mark so tab corners do not show through. -->
  <rect width="512" height="512" fill="#2a0627" />
  <image
    href="/favicon-source.png"
    x="0"
    y="0"
    width="512"
    height="512"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>
